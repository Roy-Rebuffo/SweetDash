<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>SweetDash | Gestión de Clientes</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
</head>
<body>
    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <main role="main" class="container" style="margin-top: 80px;">
        <div class="card shadow">
            <h4 class="card-header text-white bg-dark">
                <i class="fas fa-users"></i> <strong>Listado de Clientes</strong>
            </h4>
            <div class="card-body">
                <a class="btn btn-primary mb-3" th:href="@{/clientes/create}">
                    <i class="fas fa-user-plus"></i> Nuevo Cliente
                </a>
                
                <div th:if="${msg != null}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${msg}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover table-striped">
                        <thead class="thead-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nombre Completo</th>
                                <th>Teléfono</th>
                                <th>Email</th>
                                <th>Dirección</th>
                                <th>Operaciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${clientes}">
                                <td th:text="${c.idCliente}"></td>
                                <td th:text="${c.nombre + ' ' + c.apellidos}"></td>
                                <td th:text="${c.telefono}"></td>
                                <td th:text="${c.email}"></td>
                                <td th:text="${c.direccion}"></td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/clientes/edit/{id}(id=${c.idCliente})}" 
                                           class="btn btn-warning btn-sm" title="Editar">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <a th:href="@{/clientes/delete/{id}(id=${c.idCliente})}" 
                                           onclick="return confirm('¿Estás seguro de eliminar a este cliente?')" 
                                           class="btn btn-danger btn-sm" title="Eliminar">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(clientes)}">
                                <td colspan="6" class="text-center text-muted">No hay clientes registrados en la base de datos.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer th:insert="~{fragments/footer :: pie-pagina}" class="mt-5"></footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
